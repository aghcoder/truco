<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Truco</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink:      #2c5aa0;
            --ink-pen:  rgba(44, 90, 160, 0.82);
            --ruled:    rgba(100, 160, 220, 0.38);
            --ruled-h:  28px;
            --buenas-col: #2e7d32;
            --muted:    #8aabcc;
            --text:     #1e3245;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            background-image: repeating-linear-gradient(
                transparent,
                transparent calc(var(--ruled-h) - 1px),
                var(--ruled) calc(var(--ruled-h) - 1px),
                var(--ruled) var(--ruled-h)
            );
            height: 100vh;
            height: 100dvh;
            color: var(--text);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .filters { position: absolute; width: 0; height: 0; }

        /* ── Header ── */
        header {
            padding: clamp(5px, 1.4vh, 10px) 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            position: relative;
        }

        header h1 {
            font-family: 'Caveat', cursive;
            font-size: clamp(1rem, 4.5vw, 1.5rem);
            font-weight: 700;
            color: var(--ink);
            letter-spacing: 7px;
            text-transform: uppercase;
        }

        .btn-reset {
            position: absolute;
            right: 16px;
            background: none;
            border: 1px solid rgba(44, 90, 160, 0.3);
            color: rgba(44, 90, 160, 0.7);
            font-family: 'Inter', sans-serif;
            font-size: 0.65rem;
            font-weight: 600;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            letter-spacing: 1px;
            text-transform: uppercase;
            touch-action: manipulation;
        }
        .btn-reset:active { background: rgba(44, 90, 160, 0.08); }

        /* ── Paper ── */
        .paper {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* Línea vertical de lapicera al centro */
        .paper::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 1.5px;
            background: var(--ink-pen);
            z-index: 2;
            pointer-events: none;
        }

        /* ── Nombres ── */
        .paper-names {
            display: flex;
            flex-shrink: 0;
            padding: clamp(4px, 1vh, 8px) 0 clamp(2px, 0.6vh, 5px);
        }

        .paper-name {
            flex: 1;
            padding: 0 clamp(10px, 2.5vw, 16px);
            text-align: center;
        }

        .paper-name span,
        .paper-name .team-name {
            font-family: 'Caveat', cursive;
            font-size: clamp(0.78rem, 3.2vw, 1rem);
            font-weight: 700;
            color: var(--ink);
            display: block;
            text-align: center;
        }

        /* Fila de contadores separada — no tapeable para puntos */
        .paper-counts {
            display: flex;
            flex-shrink: 0;
            padding: 0 0 clamp(3px, 0.7vh, 6px);
        }

        .paper-count {
            flex: 1;
            text-align: center;
        }

        .score-count {
            font-family: 'Inter', sans-serif;
            font-size: clamp(0.46rem, 1.2vw, 0.56rem);
            font-weight: 500;
            color: var(--muted);
            letter-spacing: 1px;
        }

        .team-name-input {
            font-family: 'Caveat', cursive;
            font-size: clamp(0.85rem, 3.5vw, 1.1rem);
            font-weight: 700;
            color: var(--ink);
            background: transparent;
            border: none;
            border-bottom: 1.5px solid var(--ink);
            outline: none;
            width: 100%;
        }

        /* ── Filas de puntaje ── */
        .paper-row {
            flex: 1;
            display: flex;
            min-height: 0;
        }

        .p-section {
            flex: 1;
            padding: clamp(4px, 1vh, 8px) clamp(8px, 2vw, 14px);
            cursor: pointer;
            touch-action: manipulation;
            user-select: none;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        /* Línea horizontal de lapicera (malas / buenas) */
        .h-divider {
            height: 1.5px;
            background: var(--ink-pen);
            flex-shrink: 0;
        }

        /* ── Grupos de palitos ── */
        .section-groups {
            flex: 1;
            width: 100%;
            display: grid;
            /* grid-template-rows se setea por JS: repeat(N, tamaño-fijo) */
            gap: clamp(8px, 2vw, 16px);
            align-content: center;
            justify-items: center;
            min-height: 0;
        }

        /* Slot = mismo tamaño que el SVG, nunca cambia */
        .slot {
            width: clamp(24px, 6.5vw, 38px);
            height: clamp(24px, 6.5vw, 38px);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: visible;
        }

        /* ── SVG palitos ── */
        .stroke-svg {
            width: clamp(20px, 5.5vw, 32px);
            height: clamp(20px, 5.5vw, 32px);
            flex-shrink: 0;
            filter: url(#penInk);
        }

        .stroke-svg path {
            stroke: var(--ink);
            stroke-width: 2.5;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .stroke-svg .diag { stroke: var(--ink); }

        /* ── Botones undo ── */
        .paper-undos {
            display: flex;
            flex-shrink: 0;
            padding: clamp(3px, 0.7vh, 6px) 0;
            border-top: 1.5px solid var(--ink-pen);
        }

        .paper-undo-btn {
            flex: 1;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            color: #c0392b;
            font-size: 0.9rem;
            touch-action: manipulation;
            display: flex;
            justify-content: center;
        }
        .paper-undo-btn:active { opacity: 0.7; }

        /* ── Overlay base ── */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(20, 35, 60, 0.65);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        .overlay.show { display: flex; animation: fadeIn 0.22s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }

        .modal-card {
            background: #fff;
            border-radius: 20px;
            padding: 36px 28px;
            text-align: center;
            max-width: 300px;
            width: 88%;
            box-shadow: 0 12px 40px rgba(0,0,0,0.22);
        }

        /* ── Setup ── */
        .setup-title {
            font-family: 'Caveat', cursive;
            font-size: 1.9rem;
            font-weight: 700;
            color: var(--ink);
            letter-spacing: 5px;
            margin-bottom: 4px;
        }

        .setup-sub {
            font-size: 0.88rem;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: 24px;
        }

        .setup-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .setup-btn {
            background: #f4f4f6;
            border: 2px solid #ddd;
            border-radius: 12px;
            padding: 16px 8px;
            cursor: pointer;
            touch-action: manipulation;
            transition: background 0.12s, border-color 0.12s;
            font-family: 'Inter', sans-serif;
        }
        .setup-btn:active { background: var(--ink); border-color: var(--ink); }
        .setup-btn:active .opt-total { color: #fff; }
        .setup-btn:active .opt-sub   { color: rgba(255,255,255,0.65); }

        .opt-total {
            font-family: 'Caveat', cursive;
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--ink);
            display: block;
        }

        .opt-sub {
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--muted);
            display: block;
            margin-top: 3px;
        }

        /* ── Modal "en buenas" ── */
        #buenas-overlay .modal-card { border-top: 5px solid var(--buenas-col); }

        .buenas-icon { font-size: 2.6rem; margin-bottom: 10px; }

        .buenas-label {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--buenas-col);
            margin-bottom: 6px;
        }

        .buenas-team {
            font-family: 'Caveat', cursive;
            font-size: 1.7rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 22px;
        }

        .btn-buenas-ok {
            background: var(--buenas-col);
            color: #fff;
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: 0.88rem;
            font-weight: 700;
            padding: 12px 28px;
            border-radius: 8px;
            cursor: pointer;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            touch-action: manipulation;
        }
        .btn-buenas-ok:active { opacity: 0.85; }

        /* ── Modal ganador ── */
        #winner-overlay { flex-direction: column; gap: 18px; }

        .winner-emoji { font-size: 3.5rem; margin-bottom: 10px; }

        .winner-text {
            font-family: 'Caveat', cursive;
            font-size: clamp(1.6rem, 7vw, 2.4rem);
            font-weight: 700;
            color: var(--ink);
            margin-bottom: 6px;
        }

        .winner-sub {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--muted);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .btn-nueva {
            background: var(--ink);
            color: white;
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            padding: 14px 32px;
            border-radius: 10px;
            cursor: pointer;
            letter-spacing: 2px;
            text-transform: uppercase;
            touch-action: manipulation;
        }
        .btn-nueva:active { opacity: 0.85; }
    </style>
</head>
<body>

<!-- Filtro SVG: trazo de lapicera irregular -->
<svg class="filters">
    <defs>
        <filter id="penInk" x="-15%" y="-15%" width="130%" height="130%">
            <feTurbulence type="fractalNoise" baseFrequency="0.07 0.05" numOctaves="4" seed="8" result="noise"/>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
    </defs>
</svg>

<header>
    <h1>Truco</h1>
    <button class="btn-reset" onclick="confirmReset()">↺ Nueva</button>
</header>

<div class="paper">

    <!-- Nombres -->
    <div class="paper-names">
        <div class="paper-name">
            <span id="name-0">Nosotros</span>
        </div>
        <div class="paper-name">
            <span id="name-1">Ellos</span>
        </div>
    </div>

    <!-- Contadores (no tapeables para puntos) -->
    <div class="paper-counts">
        <div class="paper-count"><span class="score-count" id="count-0"></span></div>
        <div class="paper-count"><span class="score-count" id="count-1"></span></div>
    </div>

    <!-- Malas -->
    <div class="paper-row">
        <div class="p-section" onclick="addPoint(0)">
            <div class="section-groups" id="groups-malas-0"></div>
        </div>
        <div class="p-section" onclick="addPoint(1)">
            <div class="section-groups" id="groups-malas-1"></div>
        </div>
    </div>

    <!-- Línea horizontal lapicera -->
    <div class="h-divider"></div>

    <!-- Buenas -->
    <div class="paper-row">
        <div class="p-section" onclick="addPoint(0)">
            <div class="section-groups" id="groups-buenas-0"></div>
        </div>
        <div class="p-section" onclick="addPoint(1)">
            <div class="section-groups" id="groups-buenas-1"></div>
        </div>
    </div>

    <!-- Undo -->
    <div class="paper-undos">
        <button class="paper-undo-btn" onclick="undoPoint(0)">🗑</button>
        <button class="paper-undo-btn" onclick="undoPoint(1)">🗑</button>
    </div>

</div>

<!-- Modal: selección de puntos -->
<div class="overlay" id="setup-overlay">
    <div class="modal-card">
        <div class="setup-title">Truco</div>
        <div class="setup-sub">¿A cuántos puntos jugamos?</div>
        <div class="setup-options">
            <button class="setup-btn" onclick="startGame(20)">
                <span class="opt-total">20</span>
                <span class="opt-sub">10 + 10</span>
            </button>
            <button class="setup-btn" onclick="startGame(30)">
                <span class="opt-total">30</span>
                <span class="opt-sub">15 + 15</span>
            </button>
            <button class="setup-btn" onclick="startGame(40)">
                <span class="opt-total">40</span>
                <span class="opt-sub">20 + 20</span>
            </button>
            <button class="setup-btn" onclick="startGame(50)">
                <span class="opt-total">50</span>
                <span class="opt-sub">25 + 25</span>
            </button>
        </div>
    </div>
</div>

<!-- Modal: entró en buenas -->
<div class="overlay" id="buenas-overlay">
    <div class="modal-card">
        <div class="buenas-icon">🌟</div>
        <div class="buenas-label">Entró en buenas</div>
        <div class="buenas-team" id="buenas-team-name">Nosotros</div>
        <button class="btn-buenas-ok" onclick="closeBuenas()">¡Vamos!</button>
    </div>
</div>

<!-- Modal: ganador -->
<div class="overlay" id="winner-overlay">
    <div class="modal-card">
        <div class="winner-emoji">🏆</div>
        <div class="winner-text" id="winner-text">¡Ganaron!</div>
        <div class="winner-sub" id="winner-sub">puntos alcanzados</div>
    </div>
    <button class="btn-nueva" onclick="newGame()">Nueva Partida</button>
</div>

<script>
let state = {
    maxPoints:    null,
    halfPoints:   null,
    malaBlocks:   null,
    buenasBlocks: null,
    teams: [
        { name: 'Nosotros', points: 0, buenasShown: false },
        { name: 'Ellos',    points: 0, buenasShown: false }
    ]
};

// ── SVG palitos ───────────────────────────────────────────────────────────────

function getGroupSVG(count) {
    const sides = [
        `<path d="M8,8 L32,8"/>`,      // top
        `<path d="M32,8 L32,32"/>`,    // right
        `<path d="M32,32 L8,32"/>`,    // bottom
        `<path d="M8,32 L8,8"/>`,      // left
    ];
    let p = sides.slice(0, count).join('');
    if (count === 5) p += `<path class="diag" d="M8,8 L32,32"/>`;
    return `<svg class="stroke-svg" viewBox="0 0 40 40">${p}</svg>`;
}

// ── Render ────────────────────────────────────────────────────────────────────

function renderSection(teamIdx, section, pts, totalBlocks) {
    const container  = document.getElementById(`groups-${section}-${teamIdx}`);
    container.style.gridTemplateRows = `repeat(${totalBlocks}, clamp(24px, 6.5vw, 38px))`;
    const fullGroups = Math.floor(pts / 5);
    const remainder  = pts % 5;
    let html = '';
    for (let i = 0; i < totalBlocks; i++) {
        if (i < fullGroups) {
            html += `<div class="slot">${getGroupSVG(5)}</div>`;
        } else if (i === fullGroups && remainder > 0) {
            html += `<div class="slot">${getGroupSVG(remainder)}</div>`;
        } else {
            html += `<div class="slot"></div>`;
        }
    }
    container.innerHTML = html;
}

function renderScores(teamIdx) {
    if (!state.maxPoints) return;
    const pts  = state.teams[teamIdx].points;
    const half = state.halfPoints;

    renderSection(teamIdx, 'malas',  Math.min(pts, half),     state.malaBlocks);
    renderSection(teamIdx, 'buenas', Math.max(0, pts - half), state.buenasBlocks);

    document.getElementById(`count-${teamIdx}`).textContent = `${pts} / ${state.maxPoints}`;
}

// ── Acciones ──────────────────────────────────────────────────────────────────

function addPoint(teamIdx) {
    if (!state.maxPoints) return;
    const t = state.teams[teamIdx];
    if (t.points >= state.maxPoints) return;

    t.points++;
    renderScores(teamIdx);
    if (navigator.vibrate) navigator.vibrate(30);

    if (t.points === state.halfPoints && !t.buenasShown) {
        t.buenasShown = true;
        showBuenas(t.name);
    }

    if (t.points >= state.maxPoints) {
        setTimeout(() => showWinner(teamIdx), 300);
    }
    saveState();
}

function undoPoint(teamIdx) {
    const t = state.teams[teamIdx];
    if (t.points <= 0) return;
    if (t.points === state.halfPoints) t.buenasShown = false;
    t.points--;
    renderScores(teamIdx);
    if (navigator.vibrate) navigator.vibrate([10, 10, 10]);
    saveState();
}

// ── Modales ───────────────────────────────────────────────────────────────────

function showOverlay(id)  { document.getElementById(id).classList.add('show'); }
function closeOverlay(id) { document.getElementById(id).classList.remove('show'); }

function showBuenas(teamName) {
    document.getElementById('buenas-team-name').textContent = teamName;
    showOverlay('buenas-overlay');
}
function closeBuenas() { closeOverlay('buenas-overlay'); }

function showWinner(teamIdx) {
    document.getElementById('winner-text').textContent = `¡Ganó ${state.teams[teamIdx].name}!`;
    document.getElementById('winner-sub').textContent  = `${state.maxPoints} puntos alcanzados`;
    showOverlay('winner-overlay');
}

function newGame() {
    closeOverlay('winner-overlay');
    state.maxPoints  = null;
    state.halfPoints = null;
    state.teams.forEach(t => { t.points = 0; t.buenasShown = false; });
    saveState();
    showOverlay('setup-overlay');
}

function confirmReset() {
    if (confirm('¿Empezar una nueva partida?')) newGame();
}

function startGame(points) {
    state.maxPoints    = points;
    state.halfPoints   = points / 2;
    state.malaBlocks   = (points / 2) / 5;
    state.buenasBlocks = (points / 2) / 5;
    state.teams.forEach(t => { t.points = 0; t.buenasShown = false; });
    closeOverlay('setup-overlay');
    renderAll();
    saveState();
}

// ── Editar nombre ─────────────────────────────────────────────────────────────

function editName(teamIdx) {
    const nameEl  = document.getElementById(`name-${teamIdx}`);
    const current = state.teams[teamIdx].name;

    const input = document.createElement('input');
    input.type        = 'text';
    input.value       = current;
    input.className   = 'team-name-input';
    input.maxLength   = 12;
    nameEl.replaceWith(input);
    input.focus();
    input.select();

    let done = false;
    const finish = () => {
        if (done) return;
        done = true;
        const newName = input.value.trim() || current;
        state.teams[teamIdx].name = newName;
        const span = document.createElement('span');
        span.className   = 'team-name';
        span.id          = `name-${teamIdx}`;
        span.textContent = newName;
        input.replaceWith(span);
        saveState();
    };

    input.addEventListener('blur', finish);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') input.blur(); });
}

// ── Persistencia ──────────────────────────────────────────────────────────────

function renderAll() {
    [0, 1].forEach(i => {
        const el = document.getElementById(`name-${i}`);
        if (el) el.textContent = state.teams[i].name;
        renderScores(i);
    });
}

function saveState() {
    try { localStorage.setItem('truco_state', JSON.stringify(state)); } catch(e) {}
}

function loadState() {
    try {
        const saved = localStorage.getItem('truco_state');
        if (!saved) return;
        const p = JSON.parse(saved);
        if (!Array.isArray(p.teams) || p.teams.length !== 2) return;
        state = {
            maxPoints:    p.maxPoints    || null,
            halfPoints:   p.halfPoints   || null,
            malaBlocks:   p.malaBlocks   || null,
            buenasBlocks: p.buenasBlocks || null,
            teams: p.teams.map(t => ({
                name:        t.name        || 'Equipo',
                points:      t.points      || 0,
                buenasShown: t.buenasShown || false
            }))
        };
    } catch(e) {}
}

// ── Init ──────────────────────────────────────────────────────────────────────

loadState();
renderAll();
if (!state.maxPoints) showOverlay('setup-overlay');
</script>
</body>
</html>
